<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TerraTrack – Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <h1>TerraTrack – Admin</h1>
    <nav>
        <a href="home.html">Carte publique</a>
    </nav>
    <button id="logout-btn">Déconnexion</button>
</header>

<main>
    <div id="map"></div>

    <aside>
        <div id="error" class="error-box"></div>

        <div class="toolbar">
            <button id="center-btn">Ma position</button>
        </div>

        <input type="text" id="search-input" placeholder="Rechercher...">
        <div id="counter">
            <span id="counter-points">0</span> points &nbsp;
            <span id="counter-zones">0</span> zones
        </div>

        <h3>Observations</h3>
        <div id="observation-list"></div>

        <h3>Légende</h3>
        <div id="legend"></div>
    </aside>
</main>

<!-- Modale : s'ouvre automatiquement après le dessin d'un point ou d'une zone -->
<div id="modal-overlay">
    <div id="modal">
        <h2 id="modal-titre">Nouveau relevé</h2>

        <form id="form-releve">
            <!-- Champs cachés remplis par AdminController -->
            <input type="hidden" id="modal-type" name="type">
            <input type="hidden" id="modal-coords" name="coordinates">

            <label for="modal-title-input">Titre</label>
            <input type="text" id="modal-title-input" name="title" required placeholder="Ex: Nid d'hirondelle">

            <label for="modal-description-input">Description</label>
            <textarea id="modal-description-input" name="description" placeholder="Décris ce que tu observes..."></textarea>

            <label for="modal-category-select">Catégorie</label>
            <select id="modal-category-select" name="fk_category" required>
                <option value="">-- choisir --</option>
            </select>

            <label for="modal-images-input">Images (optionnel)</label>
            <input type="file" id="modal-images-input" name="images[]" accept="image/*" multiple>

            <div id="modal-status"></div>

            <div id="modal-boutons">
                <button type="button" id="btn-annuler">Annuler</button>
                <button type="submit">Enregistrer</button>
            </div>
        </form>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="../wrk/ObservationWorker.js"></script>
<script src="../wrk/CategoryWorker.js"></script>
<script src="../wrk/AuthWorker.js"></script>
<script src="../ctrl/UserController.js"></script>
<script src="../ctrl/AdminController.js"></script>
<script>
    const controller = new AdminController();
    controller.init();
</script>

</body>
</html>
