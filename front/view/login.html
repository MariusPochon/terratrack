<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TerraTrack – Connexion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <h1>TerraTrack</h1>
    <nav>
        <a href="home.html">Carte</a>
    </nav>
</header>

<div class="login-wrapper">
    <h2>Connexion</h2>
    <div id="error" class="error-box"></div>

    <form id="login-form">
        <label for="username-input">Nom d'utilisateur</label>
        <input type="text" id="username-input" autocomplete="username" required>

        <label for="password-input">Mot de passe</label>
        <input type="password" id="password-input" autocomplete="current-password" required>

        <button type="submit">Se connecter</button>
    </form>
</div>

<script src="../wrk/AuthWorker.js"></script>
<script src="../ctrl/LoginController.js"></script>
<script>
    const controller = new LoginController();
    controller.init();
</script>

</body>
</html>
