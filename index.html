<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TerraTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #1a2a3a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.4rem; }
        p  { color: #aac; margin-bottom: 2rem; }
        .links { display: flex; gap: 1rem; }
        a.btn {
            display: inline-block;
            padding: 0.7rem 1.6rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: opacity .15s;
        }
        a.btn:hover { opacity: .85; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-secondary { background: #fff; color: #2c3e50; }
    </style>
</head>
<body>
    <h1>TerraTrack</h1>
    <p>Application de relevés géolocalisés</p>
    <div class="links">
        <a class="btn btn-primary" href="front/view/home.html">Carte publique</a>
        <a class="btn btn-secondary" href="front/view/login.html">Administration</a>
    </div>
</body>
</html>
